<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>My Bookings</h1>

<table border="1">

<tr>
<th>Problem</th>
<th>Address</th>
<th>Date</th>
<th>Status</th>
</tr>

{% for booking in bookings %}

<tr>

<td>{{ booking[0] }}</td>
<td>{{ booking[1] }}</td>
<td>{{ booking[2] }}</td>
<td>{{ booking[3] }}</td>

</tr>

{% endfor %}

</table>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
